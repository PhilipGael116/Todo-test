<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern App Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .neon-gradient-bg {
            background: linear-gradient(135deg, #2b8cee 0%, #a855f7 100%);
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-button {
            box-shadow: 0 0 15px rgba(43, 140, 238, 0.4);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased overflow-x-hidden">
<div class="flex min-h-screen w-full flex-col lg:flex-row">
<!-- Left Side: Abstract Visual Panel -->
<div class="hidden lg:flex lg:w-3/5 relative overflow-hidden neon-gradient-bg items-center justify-center p-12">
<!-- Decorative Abstract Shapes -->
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-white/10 rounded-full blur-3xl"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-80 h-80 bg-purple-500/20 rounded-full blur-3xl"></div>
<div class="relative z-10 w-full max-w-xl">
<div class="mb-8 flex items-center gap-3">
<div class="bg-white p-2 rounded-xl shadow-lg">
<svg class="w-8 h-8 text-primary" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M39.475 21.6262C40.358 21.4363 40.6863 21.5589 40.7581 21.5934C40.7876 21.655 40.8547 21.857 40.8082 22.3336C40.7408 23.0255 40.4502 24.0046 39.8572 25.2301C38.6799 27.6631 36.5085 30.6631 33.5858 33.5858C30.6631 36.5085 27.6632 38.6799 25.2301 39.8572C24.0046 40.4502 23.0255 40.7407 22.3336 40.8082C21.8571 40.8547 21.6551 40.7875 21.5934 40.7581C21.5589 40.6863 21.4363 40.358 21.6262 39.475C21.8562 38.4054 22.4689 36.9657 23.5038 35.2817C24.7575 33.2417 26.5497 30.9744 28.7621 28.762C30.9744 26.5497 33.2417 24.7574 35.2817 23.5037C36.9657 22.4689 38.4054 21.8562 39.475 21.6262ZM4.41189 29.2403L18.7597 43.5881C19.8813 44.7097 21.4027 44.9179 22.7217 44.7893C24.0585 44.659 25.5148 44.1631 26.9723 43.4579C29.9052 42.0387 33.2618 39.5667 36.4142 36.4142C39.5667 33.2618 42.0387 29.9052 43.4579 26.9723C44.1631 25.5148 44.659 24.0585 44.7893 22.7217C44.9179 21.4027 44.7097 19.8813 43.5881 18.7597L29.2403 4.41187C27.8527 3.02428 25.8765 3.02573 24.2861 3.36776C22.6081 3.72863 20.7334 4.58419 18.8396 5.74801C16.4978 7.18716 13.9881 9.18353 11.5858 11.5858C9.18354 13.988 7.18717 16.4978 5.74802 18.8396C4.58421 20.7334 3.72865 22.6081 3.36778 24.2861C3.02574 25.8765 3.02429 27.8527 4.41189 29.2403Z" fill="currentColor" fill-rule="evenodd"></path>
</svg>
</div>
<span class="text-2xl font-bold text-white tracking-tight">FocusFlow</span>
</div>
<h1 class="text-5xl font-black text-white leading-tight mb-6 tracking-tight">
                    Master your day,<br/>one task at a time.
                </h1>
<div class="glass-effect rounded-2xl p-6 mb-8">
<div class="flex items-center gap-4 text-white/90 mb-4">
<span class="material-symbols-outlined text-primary bg-white rounded-full p-1 text-sm">check</span>
<p class="text-lg font-medium">Lightning fast interface</p>
</div>
<div class="flex items-center gap-4 text-white/90">
<span class="material-symbols-outlined text-primary bg-white rounded-full p-1 text-sm">check</span>
<p class="text-lg font-medium">Synced across all devices</p>
</div>
</div>
<div class="w-full aspect-square rounded-3xl bg-center bg-no-repeat bg-cover shadow-2xl border-4 border-white/20" data-alt="Abstract 3D neon spheres with purple and blue gradients" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAlR9mEBnku9mxCJAfc-VJ4W_a-ZGyVenNX0_Q_Sc2f1SCUv_x75u55ntXi5EulxVZ6atM5rII1hQt1Yv6uxjwzOqSokXwZ3fwVMKgOdmcDKrdpUnCRXtosvKTzujSsIGOeG85zE7NKCdh4eP_bgNoDffUaqxWhsIkBbeVvmfz4PBJUFwLxwolWCL_SCKPrz3Y3GQqz7JG139HA63IBA6EU0UPjYOT-OR43heV88cD6OgNS_uNfWTjBEb6UsufKtukur5shi2g87Q');">
</div>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="flex-1 flex flex-col justify-center items-center px-6 py-12 lg:px-24 bg-white dark:bg-background-dark">
<div class="w-full max-w-md">
<div class="mb-10">
<h2 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Welcome back</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2">Log in to your account to continue.</p>
</div>
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2" for="email">Email Address</label>
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none" id="email" placeholder="name@example.com" type="email"/>
</div>
<div>
<div class="flex items-center justify-between mb-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full h-12 px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none pr-12" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center">
<input class="h-4 w-4 rounded border-slate-300 text-primary focus:ring-primary" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-slate-600 dark:text-slate-400 font-medium" for="remember-me">Remember for 30 days</label>
</div>
<button class="w-full h-12 bg-primary text-white font-bold rounded-lg hover:bg-primary/90 transition-all active:scale-[0.98] glow-button flex items-center justify-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<div class="relative my-8">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-sm font-medium leading-6">
<span class="bg-white dark:bg-background-dark px-4 text-slate-500">Or continue with</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex w-full items-center justify-center gap-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2.5 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<svg class="h-5 w-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex w-full items-center justify-center gap-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 px-3 py-2.5 text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-800 transition-colors">
<svg class="h-5 w-5 fill-current" viewbox="0 0 24 24">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.671-1.48 3.671-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.609 1.09zM15.53 4.82c.844-1.026 1.403-2.454 1.247-3.87-1.221.052-2.701.819-3.571 1.831-.78.896-1.454 2.338-1.273 3.714 1.35.104 2.753-.74 3.597-1.675z"></path>
</svg>
<span class="text-sm font-semibold">Apple</span>
</button>
</div>
<p class="mt-10 text-center text-sm text-slate-500 dark:text-slate-400">
                    Don't have an account? 
                    <a class="font-bold text-primary hover:text-primary/80 ml-1" href="#">Sign up for free</a>
</p>
<!-- Theme Toggle Minimal -->
<div class="mt-12 flex justify-center">
<button class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined">dark_mode</span>
</button>
</div>
</div>
</div>
</div>
</body></html>
